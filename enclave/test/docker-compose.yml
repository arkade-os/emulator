# Generated by 'enclave test init' for framework version 0.0.75.
# Re-runs of 'enclave test init' will SKIP this file if it exists.
# To regenerate from scratch (e.g. after bumping the framework
# version): 'enclave test init --force-compose'.
#
# Hand-add app-specific dependency containers below the marker at
# the bottom of this file.

services:
    aws-mocks:
        image: ghcr.io/arklabshq/enclave-awsmocks:0.0.75
        ports:
            - 4000:4000
            - 1338:1338
        environment:
            IMDS_LISTEN_ADDR: :1338
            KMS_PROXY_LISTEN_ADDR: :4000
            UPSTREAM_KMS_URL: http://local-kms:8080
        depends_on:
            local-kms:
                condition: service_healthy
        healthcheck:
            test:
                - CMD-SHELL
                - wget -qO- http://localhost:4000/health && wget -qO- http://localhost:1338/health
            interval: 5s
            timeout: 3s
            retries: 5
    local-kms:
        image: nsmithuk/local-kms
        ports:
            - 8080:8080
        environment:
            KMS_ACCOUNT_ID: "123456789012"
            KMS_REGION: us-east-1
        healthcheck:
            test:
                - CMD-SHELL
                - wget -qO- http://localhost:8080/ || exit 0
            interval: 5s
            timeout: 3s
            retries: 5
    localstack:
        image: localstack/localstack:4.14
        ports:
            - 4566:4566
        environment:
            LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"
            SERVICES: ssm,sts,s3,cloudformation,iam,logs
        healthcheck:
            test:
                - CMD-SHELL
                - curl -sf http://localhost:4566/_localstack/health || exit 1
            interval: 5s
            timeout: 3s
            retries: 20
    test-runner:
        image: ghcr.io/arklabshq/enclave-test-runner:0.0.75
        environment:
            AWS_ACCESS_KEY_ID: test
            AWS_ENDPOINT_URL_KMS: http://127.0.0.1:4000
            AWS_ENDPOINT_URL_LOGS: http://127.0.0.1:4566
            AWS_ENDPOINT_URL_S3: http://127.0.0.1:4566
            AWS_ENDPOINT_URL_SSM: http://127.0.0.1:4566
            AWS_ENDPOINT_URL_STS: http://127.0.0.1:4566
            AWS_REGION: us-east-1
            AWS_SECRET_ACCESS_KEY: test
            ENCLAVE_APP_NAME: introspector
            ENCLAVE_DEPLOYMENT: dev
            IMDS_PROXY_TARGET: 127.0.0.1:1338
        volumes:
            - ../../.enclave/artifacts:/data:ro
        depends_on:
            aws-mocks:
                condition: service_healthy
            local-kms:
                condition: service_healthy
            localstack:
                condition: service_healthy
        privileged: true
        network_mode: host

    # === user services below this line ===
    # Append additional service blocks at 4-space indent so they nest
    # under the existing services: map. Do NOT add another "services:"
    # key. Wire boot ordering by adding the service name to
    # test-runner.depends_on. Example:
    #
    # mock-arkd:
    #     build:
    #         context: ../../
    #         dockerfile: enclave/test/mock-arkd/Dockerfile
    #     network_mode: host
    #     healthcheck:
    #         test: ["CMD-SHELL", "nc -z 127.0.0.1 8081 || exit 1"]
    #         interval: 5s
    #         retries: 5

    mock-arkd:
        build:
            context: ../../
            dockerfile: enclave/test/mock-arkd/Dockerfile
        network_mode: host
        environment:
            MOCK_ARKD_ADDR: ":8081"
        healthcheck:
            test: ["CMD-SHELL", "/usr/local/bin/grpcurl -plaintext -max-time 2 localhost:8081 list"]
            interval: 5s
            timeout: 3s
            retries: 5
