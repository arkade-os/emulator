name: test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Run unit tests
        run: make test

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start regtest base stack (Bitcoin Core + Fulcrum + mempool)
        run: |
          git clone --branch master https://github.com/ArkLabsHQ/arkade-regtest.git regtest
          REGTEST_PROFILES=base node regtest/regtest.mjs start

      - name: Run regtest environment
        run: make docker-run

      - name: Run integration tests
        run: make integrationtest

      - name: Capture logs
        if: failure()
        run: |
          echo "=== Emulator logs ==="
          docker logs emulator 2>&1 || true
          echo "=== Arkd logs ==="
          docker logs arkd 2>&1 || true

      - name: Tear down
        if: always()
        run: make docker-stop

      - name: Tear down regtest stack
        if: always()
        run: node regtest/regtest.mjs clean || true
