name: readme-sync

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

jobs:
  readme-sync:
    name: verify-readme-opcodes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Verify README supported opcodes are in sync
        run: go run ./cmd/readme-sync --check
